<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>方块大师 - 浏览器调试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }
    #gameCanvas {
      background: #fff;
      max-width: 100vw;
      max-height: 100vh;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border-radius: 8px;
      touch-action: none;
    }
    .info {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #fff;
      font-size: 12px;
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="750" height="1334"></canvas>
  <div class="info">浏览器调试模式（CommonJS 兼容层）</div>

  <!--
    浏览器环境的 CommonJS 兼容层
    用于让 require/module.exports 代码在浏览器跑起来调试
    实际微信小游戏环境无需此层
  -->
  <script>
    (function () {
      const moduleCache = new Map();
      const sourceCache = new Map();

      // 模块加载顺序（拓扑排序）
      const moduleFiles = [
        'src/GameConfig.js',
        'src/core/SceneManager.js',
        'src/core/InputManager.js',
        'src/core/ShapeUtils.js',
        'src/core/Grid.js',
        'src/core/Block.js',
        'src/system/SaveSystem.js',
        'src/system/LevelManager.js',
        'src/system/SkinSystem.js',
        'src/system/RewardSystem.js',
        'src/ad/AdManager.js',
        'src/ui/UIUtils.js',
        'src/ui/MainScene.js',
        'src/ui/ChapterScene.js',
        'src/ui/GameScene.js',
        'src/ui/ResultScene.js',
        'src/GameApp.js',
        'data/levels/index.json',
      ];

      // 路径归一化（处理 ../ 和 ./）
      function normalize(base, rel) {
        if (rel.endsWith('.json') || rel.endsWith('.js')) {
          // ok
        } else {
          rel = rel + '.js';
        }
        const baseParts = base.split('/').slice(0, -1);
        const relParts = rel.split('/');
        for (const p of relParts) {
          if (p === '.') continue;
          else if (p === '..') baseParts.pop();
          else baseParts.push(p);
        }
        return baseParts.join('/');
      }

      function makeRequire(currentPath) {
        return function (rel) {
          const target = normalize(currentPath, rel);
          if (moduleCache.has(target)) {
            return moduleCache.get(target).exports;
          }
          if (target.endsWith('.json')) {
            // JSON 加载（同步）
            const data = JSON.parse(sourceCache.get(target) || '{}');
            moduleCache.set(target, { exports: data });
            return data;
          }
          const src = sourceCache.get(target);
          if (!src) {
            throw new Error(`Module not found: ${target} (from ${currentPath})`);
          }
          const moduleObj = { exports: {} };
          moduleCache.set(target, moduleObj);
          const fn = new Function('require', 'module', 'exports', '__filename', src);
          fn(makeRequire(target), moduleObj, moduleObj.exports, target);
          return moduleObj.exports;
        };
      }

      // 加载所有需要的资源（包括所有章节 JSON）
      const chapterFiles = [];
      for (let i = 1; i <= 10; i++) {
        chapterFiles.push(`data/levels/chapter_${i}.json`);
      }
      const allFiles = [...moduleFiles, ...chapterFiles];

      Promise.all(
        allFiles.map((f) =>
          fetch(f).then((r) => {
            if (!r.ok) throw new Error(`Failed to load ${f}`);
            return r.text();
          }).then((text) => {
            sourceCache.set(f, text);
          }).catch((e) => {
            console.warn(`Skip ${f}: ${e.message}`);
          })
        )
      ).then(() => {
        console.log('All modules loaded, starting game...');
        // 从入口启动
        const requireFn = makeRequire('game.js');
        try {
          requireFn('./src/GameApp.js');
          const { GameApp } = requireFn('./src/GameApp.js');
          const app = new GameApp();
          app.start();
        } catch (e) {
          console.error('Boot failed:', e);
          document.body.innerHTML = `<div style="color:red;font-size:14px;padding:20px;background:#fff;font-family:monospace;white-space:pre-wrap;">启动失败: ${e.message}\n${e.stack}</div>`;
        }
      });
    })();
  </script>
</body>
</html>
